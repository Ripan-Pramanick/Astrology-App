<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vedic Astrology Loading | Jyotish • Navagraha • Sacred Spiral</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Tailwind configuration for Vedic animations -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        // Vedic specific animations
                        'vedic-spin': 'vedicSpin 20s linear infinite',
                        'vedic-spin-reverse': 'vedicSpinReverse 24s linear infinite',
                        'lotus-glow': 'lotusGlow 2.5s ease-in-out infinite alternate',
                        'om-pulse': 'omPulse 2s ease-in-out infinite',
                        'graha-orbit-1': 'grahaOrbit1 6s linear infinite',
                        'graha-orbit-2': 'grahaOrbit2 8s linear infinite',
                        'graha-orbit-3': 'grahaOrbit3 10s linear infinite',
                        'graha-orbit-4': 'grahaOrbit4 7s linear infinite',
                        'graha-orbit-5': 'grahaOrbit5 9s linear infinite',
                        'graha-orbit-6': 'grahaOrbit6 5.5s linear infinite',
                        'mala-slide': 'malaSlide 3s ease-in-out infinite',
                        'sanskrit-float': 'sanskritFloat 3s ease-in-out infinite',
                        'kundli-fade': 'kundliFade 1.8s ease-in-out infinite alternate',
                        'swastika-spin': 'swastikaSpin 30s linear infinite',
                        'diya-flicker': 'diyaFlicker 1.2s ease-in-out infinite alternate',
                        'conch-pulse': 'conchPulse 2.2s ease-in-out infinite',
                        'chakra-spin': 'chakraSpin 12s linear infinite',
                    },
                    keyframes: {
                        vedicSpin: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' }
                        },
                        vedicSpinReverse: {
                            '0%': { transform: 'rotate(360deg)' },
                            '100%': { transform: 'rotate(0deg)' }
                        },
                        lotusGlow: {
                            '0%': { filter: 'drop-shadow(0 0 5px #ff9933)', transform: 'scale(0.98)' },
                            '100%': { filter: 'drop-shadow(0 0 20px #ff6600)', transform: 'scale(1.05)' }
                        },
                        omPulse: {
                            '0%': { opacity: '0.6', textShadow: '0 0 5px #ff6600' },
                            '100%': { opacity: '1', textShadow: '0 0 20px #ff9933, 0 0 5px #ff3300' }
                        },
                        grahaOrbit1: {
                            '0%': { transform: 'rotate(0deg) translateX(75px) rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg) translateX(75px) rotate(-360deg)' }
                        },
                        grahaOrbit2: {
                            '0%': { transform: 'rotate(60deg) translateX(60px) rotate(-60deg)' },
                            '100%': { transform: 'rotate(420deg) translateX(60px) rotate(-420deg)' }
                        },
                        grahaOrbit3: {
                            '0%': { transform: 'rotate(120deg) translateX(88px) rotate(-120deg)' },
                            '100%': { transform: 'rotate(480deg) translateX(88px) rotate(-480deg)' }
                        },
                        grahaOrbit4: {
                            '0%': { transform: 'rotate(180deg) translateX(50px) rotate(-180deg)' },
                            '100%': { transform: 'rotate(540deg) translateX(50px) rotate(-540deg)' }
                        },
                        grahaOrbit5: {
                            '0%': { transform: 'rotate(240deg) translateX(95px) rotate(-240deg)' },
                            '100%': { transform: 'rotate(600deg) translateX(95px) rotate(-600deg)' }
                        },
                        grahaOrbit6: {
                            '0%': { transform: 'rotate(300deg) translateX(68px) rotate(-300deg)' },
                            '100%': { transform: 'rotate(660deg) translateX(68px) rotate(-660deg)' }
                        },
                        malaSlide: {
                            '0%': { transform: 'translateX(-5px)', opacity: '0.5' },
                            '100%': { transform: 'translateX(5px)', opacity: '1' }
                        },
                        sanskritFloat: {
                            '0%': { transform: 'translateY(0px)', opacity: '0.5' },
                            '100%': { transform: 'translateY(-8px)', opacity: '1' }
                        },
                        kundliFade: {
                            '0%': { opacity: '0.3', transform: 'scale(0.95)' },
                            '100%': { opacity: '0.8', transform: 'scale(1.05)' }
                        },
                        swastikaSpin: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' }
                        },
                        diyaFlicker: {
                            '0%': { opacity: '0.7', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1.08)' }
                        },
                        conchPulse: {
                            '0%': { filter: 'drop-shadow(0 0 2px #ffcc66)' },
                            '100%': { filter: 'drop-shadow(0 0 12px #ff9933)' }
                        },
                        chakraSpin: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Vedic color palette - Saffron, Vermilion, Sandalwood */
        body {
            background: radial-gradient(ellipse at 30% 40%, #1a0a1a 0%, #0d050d 50%, #050208 100%);
            font-family: 'Segoe UI', 'Poppins', 'Nirmala UI', 'Kalam', system-ui, sans-serif;
        }
        
        /* Traditional rangoli pattern overlay */
        .rangoli-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.08;
            background-image: radial-gradient(circle at 25% 40%, #ff9933 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* Custom scroll / no scroll */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* Diya flame inner glow */
        .flame-glow {
            animation: diyaFlicker 0.8s ease-in-out infinite alternate;
        }
        
        @keyframes subtle-rangoli {
            0% { opacity: 0.05; transform: scale(1); }
            100% { opacity: 0.12; transform: scale(1.02); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <!-- Sacred background elements -->
    <div class="rangoli-bg"></div>
    <div class="fixed inset-0 pointer-events-none opacity-20" style="background: repeating-linear-gradient(45deg, #ff993310 0px, #ff993310 2px, transparent 2px, transparent 8px);"></div>

    <!-- Main Vedic Loading Card -->
    <div class="relative z-10 w-full max-w-md mx-auto">
        <div class="bg-gradient-to-br from-amber-950/30 via-orange-950/20 to-red-950/30 backdrop-blur-xl rounded-2xl border border-amber-600/30 shadow-2xl shadow-orange-900/20 p-6 md:p-8 transition-all duration-300">
            
            <!-- Sri Yantra / Sacred Geometry inspired chakra -->
            <div class="relative flex justify-center mb-6">
                <div class="relative w-56 h-56 md:w-64 md:h-64">
                    <!-- Outer ring with vedic patterns -->
                    <div class="absolute inset-0 rounded-full border-2 border-amber-500/40 animate-vedic-spin"></div>
                    <div class="absolute inset-3 rounded-full border border-dashed border-orange-400/30 animate-vedic-spin-reverse"></div>
                    <div class="absolute inset-6 rounded-full border border-amber-600/20 animate-vedic-spin" style="animation-duration: 15s;"></div>
                    
                    <!-- 12 zodiac markers (Rashis) in Vedic style -->
                    <div class="absolute inset-0">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1 w-3 h-3 bg-orange-400 rounded-full shadow-glow"></div>
                        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1 w-3 h-3 bg-orange-400/60 rounded-full"></div>
                        <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1 w-3 h-3 bg-orange-400/60 rounded-full"></div>
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1 w-3 h-3 bg-orange-400/60 rounded-full"></div>
                        <div class="absolute top-1/4 left-1/4 w-2 h-2 bg-amber-500/40 rounded-full"></div>
                        <div class="absolute bottom-1/4 right-1/4 w-2 h-2 bg-amber-500/40 rounded-full"></div>
                        <div class="absolute top-1/4 right-1/4 w-2 h-2 bg-amber-500/40 rounded-full"></div>
                        <div class="absolute bottom-1/4 left-1/4 w-2 h-2 bg-amber-500/40 rounded-full"></div>
                    </div>
                    
                    <!-- Lotus Petals (8 petal representation) -->
                    <div class="absolute inset-8">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-5 h-5 bg-gradient-to-b from-amber-400/60 to-orange-600/40 rounded-full blur-sm animate-lotus-glow" style="top: -6px;"></div>
                        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-5 h-5 bg-gradient-to-t from-amber-400/60 to-orange-600/40 rounded-full blur-sm animate-lotus-glow" style="bottom: -6px;"></div>
                        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-5 h-5 bg-gradient-to-r from-amber-400/60 to-orange-600/40 rounded-full blur-sm animate-lotus-glow" style="left: -6px;"></div>
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-5 h-5 bg-gradient-to-l from-amber-400/60 to-orange-600/40 rounded-full blur-sm animate-lotus-glow" style="right: -6px;"></div>
                    </div>
                    
                    <!-- Central OM / Bindu with pulsating energy -->
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-gradient-to-br from-orange-500/20 to-amber-600/20 rounded-full flex items-center justify-center backdrop-blur-sm border border-amber-400/50 shadow-xl">
                        <span class="text-3xl font-bold text-amber-300 animate-om-pulse" style="font-family: 'Nirmala UI', 'Segoe UI Symbol', sans-serif;">ॐ</span>
                    </div>
                    
                    <!-- Navagraha (9 planets) orbiting around -->
                    <!-- Surya (Sun) -->
                    <div class="absolute top-1/2 left-1/2 w-4 h-4 rounded-full bg-gradient-to-br from-yellow-400 to-orange-500 shadow-lg animate-graha-orbit-1" style="transform-origin: center; --radius: 75px;"></div>
                    <!-- Chandra (Moon) -->
                    <div class="absolute top-1/2 left-1/2 w-3.5 h-3.5 rounded-full bg-gradient-to-br from-gray-200 to-slate-300 shadow-md animate-graha-orbit-2" style="transform-origin: center; --radius: 60px;"></div>
                    <!-- Mangal (Mars) -->
                    <div class="absolute top-1/2 left-1/2 w-4 h-4 rounded-full bg-gradient-to-br from-red-500 to-red-700 shadow-lg animate-graha-orbit-3" style="transform-origin: center; --radius: 88px;"></div>
                    <!-- Budh (Mercury) -->
                    <div class="absolute top-1/2 left-1/2 w-3 h-3 rounded-full bg-gradient-to-br from-emerald-400 to-teal-600 shadow-md animate-graha-orbit-4" style="transform-origin: center; --radius: 50px;"></div>
                    <!-- Guru (Jupiter) -->
                    <div class="absolute top-1/2 left-1/2 w-5 h-5 rounded-full bg-gradient-to-br from-amber-300 to-yellow-600 shadow-lg animate-graha-orbit-5" style="transform-origin: center; --radius: 95px;"></div>
                    <!-- Shukra (Venus) -->
                    <div class="absolute top-1/2 left-1/2 w-3.5 h-3.5 rounded-full bg-gradient-to-br from-pink-300 to-rose-500 shadow-md animate-graha-orbit-6" style="transform-origin: center; --radius: 68px;"></div>
                </div>
            </div>
            
            
        <!-- Vedic Footer Note -->
        <div class="text-center mt-4 text-amber-600/40 text-[10px] tracking-wider">
            श्री गणेशाय नमः • Vedic Astrology Loading
        </div>
    </div>
    
    <!-- Floating Particles (Akshata - Rice grain vibes) -->
    <script>
        // Create subtle floating sacred particles
        function createVedicParticles() {
            const particleContainer = document.body;
            const particleCount = 40;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'fixed pointer-events-none rounded-full';
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = `radial-gradient(circle, rgba(255, 153, 51, ${Math.random() * 0.5 + 0.2}), rgba(255, 102, 0, 0.2))`;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animation = `floatVedic ${Math.random() * 5 + 4}s infinite ease-in-out`;
                particle.style.opacity = Math.random() * 0.6 + 0.2;
                particleContainer.appendChild(particle);
            }
        }
        
        // Add floating keyframe dynamically
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes floatVedic {
                0% { transform: translateY(0px) translateX(0px) rotate(0deg); opacity: 0.2; }
                50% { transform: translateY(-25px) translateX(12px) rotate(180deg); opacity: 0.7; }
                100% { transform: translateY(-5px) translateX(-5px) rotate(360deg); opacity: 0.3; }
            }
            .shadow-glow {
                box-shadow: 0 0 8px #ff9933;
            }
        `;
        document.head.appendChild(styleSheet);
        
        createVedicParticles();
        
        // Add subtle Vedic mantra console greeting
        console.log("%c🕉 ॐ नमो भगवते वासुदेवाय • Vedic Astrology Loading  🕉", "color: #ff9933; font-size: 14px; font-family: monospace;");
        
        // Adding nakshatra (star) extra
        const starContainer = document.createElement('div');
        starContainer.className = 'fixed inset-0 pointer-events-none opacity-30';
        starContainer.style.backgroundImage = `radial-gradient(1px 1px at 15px 40px, #ffcc77, transparent), radial-gradient(1.5px 1.5px at 70px 120px, #ffaa66, transparent)`;
        starContainer.style.backgroundSize = '100px 100px, 150px 150px';
        starContainer.style.backgroundRepeat = 'repeat';
        document.body.appendChild(starContainer);
    </script>
    
    <style>
        /* Fix orbit CSS variable binding for planets */
        [class*="animate-graha-orbit-"] {
            transform-origin: center;
            will-change: transform;
        }
        
        /* Additional traditional border effect on card */
        .bg-gradient-to-br {
            background-attachment: fixed;
        }
        
        /* Diya & Conch animations refined */
        @keyframes floatVedic {
            0% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
            100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
        }
    </style>
</body>
</html>
