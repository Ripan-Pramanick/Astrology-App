<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e9e6df 0%, #dcd6cc 100%);
      font-family: 'Inter', sans-serif;
      padding: 2rem 1.5rem;
      color: #1e1b17;
    }

    /* main container */
    .report-container {
      max-width: 1280px;
      margin: 0 auto;
      background: #fefaf5;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 2px 6px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* header branding */
    .report-header {
      background: #2c2a24;
      padding: 1.4rem 2rem;
      border-bottom: 4px solid #e6b34c;
    }

    .report-header h1 {
      color: #f7e9cd;
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.3px;
      margin: 0;
    }

    .report-header p {
      color: #cbc3ae;
      margin-top: 0.35rem;
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* card style sections */
    .section-card {
      background: white;
      margin: 1.8rem 2rem;
      border-radius: 1.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid #f0e7db;
      overflow-x: auto;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      padding: 1.2rem 1.8rem 0.4rem 1.8rem;
      color: #4a3727;
      border-left: 5px solid #e6b34c;
      margin-bottom: 0.5rem;
      background: #fffbf5;
    }

    .section-sub {
      padding: 0 1.8rem 0.8rem 1.8rem;
      font-size: 0.8rem;
      color: #8b765c;
      letter-spacing: 0.3px;
    }

    /* table styling */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .data-table th {
      background: #f8f3ea;
      text-align: left;
      padding: 0.9rem 1rem;
      font-weight: 600;
      color: #4e3b28;
      border-bottom: 1px solid #e2d6c8;
    }

    .data-table td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #f0e7dd;
      color: #2e2a24;
      font-weight: 450;
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .badge-planet {
      background: #f3ede5;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
      display: inline-block;
      color: #ab7e4b;
    }

    .grid-2col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      padding: 0.5rem 1.8rem 1.8rem 1.8rem;
    }

    .info-chip {
      background: #fefaf2;
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      border: 1px solid #f0e2d2;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .info-chip strong {
      color: #c28135;
      font-weight: 600;
      display: inline-block;
      min-width: 85px;
    }

    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      padding: 1.5rem;
      color: #a08c74;
      border-top: 1px solid #ede3d7;
      background: #fefaf5;
      margin-top: 0.5rem;
    }

    @media (max-width: 700px) {
      body {
        padding: 1rem;
      }
      .section-card {
        margin: 1rem;
      }
      .data-table td, .data-table th {
        padding: 0.6rem 0.8rem;
        font-size: 0.8rem;
      }
      .section-title {
        font-size: 1.3rem;
        padding: 1rem 1.2rem 0.2rem 1.2rem;
      }
    }

    .highlight-accent {
      color: #b46f2c;
      font-weight: 500;
    }

      font-size: 0.85rem;
      background: #f7f1e9;
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 12px;
